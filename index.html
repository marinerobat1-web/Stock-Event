<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stock Events Pro</title>

<style>
body{margin:0;font-family:Arial;background:#0b1020;color:white}
.app{max-width:900px;margin:auto;padding:20px}
.card{background:#111827;padding:15px;border-radius:15px;margin-bottom:15px}
.title{font-weight:bold;font-size:18px}
.date{color:#9ca3af}
.small{font-size:13px;color:#9ca3af}
.ok{color:#22c55e}
.bad{color:#ef4444}
</style>

</head>

<body>
<div class="app">

<h1>📦 Stock Events</h1>

<div id="events"></div>

</div>

<script>

const events = [
{
  name:"WEC",
  start:"2026-05-07",
  end:"2026-05-09",
  mats:[
    {name:"Radio NX1300", need:130, stock:130},
    {name:"Radio TK37", need:10, stock:100},
    {name:"Batterie NX1300/TK37", need:110, stock:190},
    {name:"Rack de charge", need:20, stock:15},
  ]
},
{
  name:"8h moto",
  start:"2026-06-05",
  end:"2026-06-06",
  mats:[
    {name:"Radio NX1300", need:75, stock:130},
  ]
}
];

function durationDays(ev){
  const start = new Date(ev.start);
  const end = new Date(ev.end);
  const diff = Math.round((end - start)/(1000*60*60*24)) + 1;
  return diff + " jours";
}

function render(){

  const container = document.getElementById("events");

  container.innerHTML = events.map(ev => {

    const rows = ev.mats.map(m => {
      const diff = m.stock - m.need;

      return `
      <tr>
        <td>${m.name}</td>
        <td>${m.stock}</td>
        <td>${m.need}</td>
        <td class="${diff>=0?'ok':'bad'}">
          ${diff>=0 ? 'OK' : 'Manque ' + Math.abs(diff)}
        </td>
      </tr>`;
    }).join("");

    return `
    <div class="card">
      <div class="title">${ev.name}</div>
      <div class="date">${ev.start} → ${ev.end}</div>
      <div class="small">Durée : ${durationDays(ev)}</div>

      <table width="100%">
        <tr>
          <th>Matériel</th>
          <th>Stock</th>
          <th>Besoin</th>
          <th>Résultat</th>
        </tr>
        ${rows}
      </table>
    </div>
    `;

  }).join("");

}

render();

</script>

</body>
</html>
